name: E2E Tests & Security (Web & Android)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dast-security:
    name: DAST Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Start Local Backend Server
        working-directory: backend
        run: |
          # Write mock environment variables including Gemini API Key
          echo "GEMINI_API_KEY=AIzaSyMockKeyForVerification" > .env
          echo "PORT=3000" >> .env
          node server.js &
          # Wait for backend to be online
          for i in {1..30}; do curl -s http://localhost:3000/health && break || sleep 2; done

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install DAST dependencies
        run: pip install requests

      - name: Run DAST Vulnerability Tests
        run: |
          python automated_test/run_dast.py

      - name: Verify 0 Security Findings
        run: |
          python -c "
          import json, sys
          with open('automated_test/report.json') as f:
              data = json.load(f)
          findings = [r for r in data if r.get('finding')]
          if findings:
              print(f'❌ Security test failed! Found {len(findings)} vulnerability findings:')
              for f in findings:
                  print(f'  - Category: {f.get(\"test_category\")}, Severity: {f.get(\"severity\")}, Note: {f.get(\"note\")}')
              sys.exit(1)
          else:
              print('✅ 0 vulnerability findings! Security check passed.')
          "

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-security-report
          path: automated_test/report.json

  selenium-e2e:
    name: Selenium E2E Web Tests
    runs-on: ubuntu-latest
    needs: dast-security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install web dependencies
        working-directory: website
        run: npm install

      - name: Run Selenium E2E tests
        working-directory: website
        run: |
          npm run dev &
          # Wait for Next.js to start
          for i in {1..30}; do curl -s http://localhost:3000 && break || sleep 2; done
          HEADLESS=true npm test

      - name: Upload Selenium report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: website/reports/selenium-report.xlsx


