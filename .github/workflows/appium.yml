name: Appium Mobile Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK for Appium
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-appium
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  appium-tests:
    name: Run Appium Tests on Emulator
    needs: build-apk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Appium and Driver
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2

      - name: Download Built APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk-appium
          path: app/build/outputs/apk/debug/

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -gpu off -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "Waiting for emulator to be online via adb..."
            adb wait-for-device
            
            echo "Checking sys.boot_completed..."
            boot_completed=""
            while [ "$boot_completed" != "1" ]; do
              boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r\n')
              if [ "$boot_completed" != "1" ]; then
                echo "Still booting (sys.boot_completed=$boot_completed)..."
                sleep 5
              fi
            done
            echo "Emulator is fully booted!"

            echo "Verifying adb devices..."
            adb devices
            if ! adb devices | grep -E "emulator-5554\s+device"; then
              echo "Error: emulator-5554 device not found!"
              exit 1
            fi

            echo "Installing APK..."
            adb install app/build/outputs/apk/debug/app-debug.apk

            echo "Starting Appium server..."
            mkdir -p build
            appium --log build/appium.log &

            echo "Waiting for Appium server to start..."
            for i in {1..30}; do
              if nc -z localhost 4723 || curl -s http://localhost:4723/status > /dev/null; then
                echo "Appium server is up and running!"
                break
              fi
              sleep 2
            done

            echo "Executing Appium Tests..."
            ./gradlew :appium-automation:test

      - name: Upload Appium Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-reports
          path: |
            appium-automation/build/reports/
            appium-automation/build/allure-results/
            build/appium.log
          retention-days: 7
