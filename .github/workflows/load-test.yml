name: Load Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  load-tests:
    name: Run Performance Load Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: load-test-scripts/package-lock.json

      - name: Install dependencies
        working-directory: load-test-scripts
        run: npm ci

      - name: Run Performance Suite
        run: node load-test-scripts/run_perf_tests.js

      - name: Upload Load Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-reports
          path: load-test-scripts/load-test-reports/
          retention-days: 7
